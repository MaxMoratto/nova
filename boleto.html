<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOVA Strike Series · Boleto</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0}
  body{min-height:100vh;background:radial-gradient(900px 600px at 50% -10%,#171b26,#080a0e) fixed,#080a0e;color:#e8eaf0;font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:22px 14px 40px;-webkit-font-smoothing:antialiased}
  .state{font-size:14px;color:#8a92a6;margin-top:44px;text-align:center}
  .state.err{color:#ff8f98}
  #cv{width:100%;max-width:360px;height:auto;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:none}
  .actions{display:flex;gap:10px;margin-top:18px}
  .btn{border:none;border-radius:12px;padding:12px 22px;font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;color:#fff;background:linear-gradient(180deg,#ff3646,#e11d2a);text-decoration:none;display:inline-flex;align-items:center}
  .btn.ghost{background:transparent;border:1px solid #2d3547;color:#8a92a6}
  .btn:hover{filter:brightness(1.08)}
  .tip{font-size:11px;color:#5f6779;margin-top:12px;text-align:center;max-width:320px;line-height:1.5}
</style>
</head>
<body>
  <div id="state" class="state">Cargando boleto…</div>
  <canvas id="cv"></canvas>
  <div class="actions" id="actions" style="display:none">
    <button class="btn" id="dlBtn">Descargar</button>
    <a class="btn ghost" href="index.html">Sitio</a>
  </div>
  <div class="tip" id="tip" style="display:none">Guarda o descarga tu boleto. Es válido una sola vez: al escanearlo en la entrada queda registrado.</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const firebaseConfig = { apiKey:"AIzaSyAXxTUFo0CHFZnAs0wGrYHLTwwVzZ_ArZA", authDomain:"nova-dd664.firebaseapp.com", projectId:"nova-dd664", storageBucket:"nova-dd664.firebasestorage.app", messagingSenderId:"967862553249", appId:"1:967862553249:web:3524af97999ce667bafee0" };
const EVENTO = { hora:"" };   // <-- cuando haya horario, pon aquí "20:00" y aparece en el boleto
// Posiciones (fracción del boleto) de cada dato, medidas del SVG original
const FR = {
  VIP:     { img:'vip_ticket.webp',     qr:{x:.1536,y:.5710,w:.6928,h:.2893}, hora:{x:.8400,y:.2774,f:.0196}, folio:{x:.3540,y:.8978,f:.0150}, seat:true, mesa:{x:.3433,y:.5470,f:.030}, asiento:{x:.6760,y:.5470,f:.030} },
  GENERAL: { img:'general_ticket.webp', qr:{x:.1536,y:.5711,w:.6927,h:.2893}, hora:{x:.8690,y:.2774,f:.0196}, folio:{x:.3620,y:.8978,f:.0150}, seat:false }
};
const params=new URLSearchParams(location.search);
const token=params.get('t')||'DEMO-TOKEN';
const demo=params.get('demo');
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const $=id=>document.getElementById(id);
let CUR=null;

function fail(msg){ const s=$('state'); s.className='state err'; s.textContent=msg; }

function makeQRCanvas(text){ const div=document.createElement('div'); new QRCode(div,{ text, width:700, height:700, correctLevel:QRCode.CorrectLevel.H }); return div.querySelector('canvas'); }
function loadImg(src){ return new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=src; }); }

async function render(d){
  CUR=d;
  const tipo = d.tipo==='VIP' ? 'VIP' : 'GENERAL';
  const cfg=FR[tipo];
  let bg; try{ bg=await loadImg(cfg.img); }catch(e){ fail('No se pudo cargar el diseño del boleto.'); return; }
  const W=bg.naturalWidth, H=bg.naturalHeight;
  const cv=$('cv'); cv.width=W; cv.height=H; const ctx=cv.getContext('2d');
  ctx.drawImage(bg,0,0,W,H);
  // QR dentro del recuadro blanco
  const url=location.origin+'/boleto.html?t='+encodeURIComponent(token);
  const qc=makeQRCanvas(url);
  if(qc){ const bx=cfg.qr.x*W, by=cfg.qr.y*H, bw=cfg.qr.w*W, bh=cfg.qr.h*H;
    const side=Math.min(bw,bh)*0.86, qx=bx+bw/2-side/2, qy=by+bh/2-side/2;
    ctx.drawImage(qc, qx, qy, side, side); }
  // Textos
  ctx.fillStyle='#FEFEFE'; ctx.textBaseline='alphabetic';
  const put=(c,val,align)=>{ ctx.textAlign=align; ctx.font='bold '+(c.f*H)+'px Arial, sans-serif'; ctx.fillText(String(val), c.x*W, c.y*H); };
  put(cfg.hora, EVENTO.hora||'—','center');
  put(cfg.folio, d.folio||'','left');
  if(cfg.seat){ put(cfg.mesa, d.mesa!=null?d.mesa:'—','center'); put(cfg.asiento, d.asiento!=null?d.asiento:'—','center'); }
  // Marca "YA INGRESÓ" si el boleto ya se usó
  if(d.estado==='usado'){ ctx.save(); ctx.translate(W/2,H*0.72); ctx.rotate(-Math.PI/9);
    ctx.fillStyle='rgba(8,10,14,.55)'; ctx.fillRect(-W*0.5,-H*0.05,W,H*0.10);
    ctx.fillStyle='#ff8f98'; ctx.textAlign='center'; ctx.font='bold '+(H*0.05)+'px Oswald, Arial, sans-serif'; ctx.fillText('YA INGRESÓ', 0, H*0.018); ctx.restore(); }
  cv.style.display='block'; $('state').style.display='none'; $('actions').style.display='flex'; $('tip').style.display='block';
}

async function load(){
  if(demo){ return render({ tipo: demo==='general'?'GENERAL':'VIP', folio: demo==='general'?'NSS-GEN-0007':'NSS-VIP-M07-S3', mesa:7, asiento:3, estado:'valido', comprador:{nombre:'DEMO'} }); }
  if(!token || token==='DEMO-TOKEN'){ fail('Boleto no válido (falta el código).'); return; }
  let snap; try{ snap=await db.collection('boletos').doc(token).get(); }catch(e){ fail('No se pudo cargar el boleto. '+e.message); return; }
  if(!snap.exists){ fail('Este boleto no existe o fue cancelado.'); return; }
  const d=snap.data();
  if(d.estado==='cancelado'){ fail('Este boleto fue cancelado.'); return; }
  render(d);
}

$('dlBtn').addEventListener('click',()=>{ const cv=$('cv'); const a=document.createElement('a');
  a.download='NSS-'+((CUR&&CUR.folio)||'boleto')+'.png'; a.href=cv.toDataURL('image/png'); a.click(); });

load();
</script>
</body>
</html>
