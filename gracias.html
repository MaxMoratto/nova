<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOVA Strike Series · Pago confirmado</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0}
  body{min-height:100vh;background:radial-gradient(900px 600px at 50% -10%,#171b26,#080a0e) fixed,#080a0e;color:#e8eaf0;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
  .card{max-width:460px;width:100%;background:#11151d;border:1px solid #212836;border-radius:18px;padding:38px 30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .check{width:76px;height:76px;border-radius:50%;background:linear-gradient(180deg,#2bd576,#128c4b);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 0 34px rgba(37,211,102,.4)}
  .check svg{width:38px;height:38px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;margin-bottom:10px}
  p{color:#8a92a6;font-size:14px;line-height:1.65;margin-bottom:8px}
  .brand{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:#5f6779;margin-bottom:26px}
  .brand b{color:#ff3646} .brand i{color:#00c2ff;font-style:normal}
  a.btn{display:inline-block;margin-top:22px;background:linear-gradient(180deg,#ff3646,#e11d2a);color:#fff;text-decoration:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;padding:13px 30px;border-radius:12px}
  a.btn:hover{filter:brightness(1.08)}
  .muted{font-size:12px;color:#5f6779;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><b>NOVA</b> STRIKE <i>SERIES</i></div>
    <div class="check" id="gcheck"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
    <h1 id="gtitle">¡Pago confirmado!</h1>
    <p id="gmsg">Gracias por tu compra. Tu pago se procesó correctamente.</p>
    <p>En breve recibirás la confirmación de tus lugares en tu correo. Nos vemos el <b style="color:#e8eaf0">11 de septiembre</b> en CDMX.</p>
    <a class="btn" href="index.html">Volver al sitio</a>
    <div class="muted">Si tienes dudas, escríbenos por WhatsApp.</div>
  </div>
  <script>
    (function(){
      var q=new URLSearchParams(location.search);
      var st=(q.get('status')||'').toLowerCase();
      var pending = q.get('pending')==='1' || st==='pending' || st==='in_process';
      if(pending){
        document.getElementById('gtitle').textContent='Pago en proceso';
        document.getElementById('gmsg').textContent='Tu pago quedó pendiente. Si elegiste OXXO o transferencia, tienes hasta la fecha del comprobante para pagarlo; en cuanto se acredite te confirmamos tus lugares.';
        var c=document.getElementById('gcheck');
        c.style.background='linear-gradient(180deg,#f4b942,#c8860a)';
        c.style.boxShadow='0 0 34px rgba(244,185,66,.4)';
        c.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
      }
    })();
  </script>
</body>
</html>
